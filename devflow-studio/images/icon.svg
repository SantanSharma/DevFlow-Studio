<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background rounded rectangle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#005a9e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded rectangle background -->
  <rect x="8" y="8" width="112" height="112" rx="20" ry="20" fill="url(#bgGradient)"/>
  
  <!-- Kanban board icon - three columns with cards -->
  <!-- Left column -->
  <rect x="24" y="32" width="22" height="64" rx="2" ry="2" fill="#ffffff" opacity="0.9"/>
  <rect x="26" y="36" width="18" height="12" rx="1" ry="1" fill="#0078d4"/>
  <rect x="26" y="52" width="18" height="12" rx="1" ry="1" fill="#0078d4"/>
  
  <!-- Middle column -->
  <rect x="53" y="32" width="22" height="64" rx="2" ry="2" fill="#ffffff" opacity="0.9"/>
  <rect x="55" y="36" width="18" height="12" rx="1" ry="1" fill="#0078d4"/>
  <rect x="55" y="52" width="18" height="12" rx="1" ry="1" fill="#0078d4"/>
  <rect x="55" y="68" width="18" height="12" rx="1" ry="1" fill="#0078d4"/>
  
  <!-- Right column -->
  <rect x="82" y="32" width="22" height="64" rx="2" ry="2" fill="#ffffff" opacity="0.9"/>
  <rect x="84" y="36" width="18" height="12" rx="1" ry="1" fill="#0078d4"/>
  
  <!-- Checkmark badge in bottom right -->
  <circle cx="100" cy="100" r="16" fill="#107c10"/>
  <path d="M 93 100 L 98 105 L 107 94" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
